name: CI

# Runs the test suite on every push and PR so projection-math regressions
# are caught before they reach the deployed app. (The daily refresh-data
# workflow only refreshes the DB — it never runs tests.)

on:
  push:
  pull_request:
  workflow_dispatch: {}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest

      - name: Compile check (catches syntax errors in every module)
        run: python -m compileall -q src tabs scripts scrapers nascar_dfs_app.py

      - name: Run tests
        run: pytest tests/ -v
